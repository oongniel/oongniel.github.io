<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AIDEN TURNS 7 — WORLD 7-1</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --sky: #5c94fc;
                --sky-deep: #3a6fd8;
                --brick: #c84c0c;
                --brick-dark: #7c2d00;
                --coin: #fac000;
                --coin-shine: #ffe38a;
                --pipe: #00a844;
                --pipe-dark: #006e2c;
                --panel: #101830;
                --white: #ffffff;
                --ground-h: 96px;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html,
            body {
                height: 100%;
            }

            body {
                font-family: "Press Start 2P", monospace;
                background: var(--sky);
                color: var(--white);
                overflow: hidden;
                -webkit-font-smoothing: none;
                image-rendering: pixelated;
            }

            /* ============ SCREENS ============ */
            .screen {
                position: fixed;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background: linear-gradient(
                    var(--sky) 0%,
                    var(--sky) 70%,
                    var(--sky-deep) 100%
                );
                transition: transform 0.6s cubic-bezier(0.7, 0, 0.3, 1);
                padding: 24px 16px calc(var(--ground-h) + 24px);
            }
            #screen-details {
                transform: translateX(100%);
            }
            body.show-details #screen-intro {
                transform: translateX(-100%);
            }
            body.show-details #screen-details {
                transform: translateX(0);
            }

            /* ============ CLOUDS ============ */
            .cloud {
                position: absolute;
                width: 84px;
                height: 32px;
                background:
                    radial-gradient(
                        circle at 22px 20px,
                        #fff 14px,
                        transparent 15px
                    ),
                    radial-gradient(
                        circle at 44px 14px,
                        #fff 17px,
                        transparent 18px
                    ),
                    radial-gradient(
                        circle at 64px 20px,
                        #fff 13px,
                        transparent 14px
                    );
                filter: drop-shadow(0 3px 0 rgba(0, 0, 0, 0.08));
                animation: drift linear infinite;
                pointer-events: none;
            }
            .cloud.c1 {
                top: 12%;
                animation-duration: 46s;
            }
            .cloud.c2 {
                top: 26%;
                animation-duration: 62s;
                animation-delay: -20s;
                transform: scale(1.4);
            }
            .cloud.c3 {
                top: 8%;
                animation-duration: 74s;
                animation-delay: -45s;
                transform: scale(0.8);
            }
            @keyframes drift {
                from {
                    left: -120px;
                }
                to {
                    left: 110%;
                }
            }

            /* ============ GROUND ============ */
            .ground {
                position: fixed;
                left: 0;
                right: 0;
                bottom: 0;
                height: var(--ground-h);
                background:
                    repeating-linear-gradient(
                        90deg,
                        var(--brick) 0 30px,
                        var(--brick-dark) 30px 32px
                    ),
                    var(--brick);
                background-size: 32px 32px;
                border-top: 6px solid var(--brick-dark);
                box-shadow: inset 0 10px 0 rgba(255, 255, 255, 0.15);
                z-index: 5;
            }
            .ground::before {
                content: "";
                position: absolute;
                inset: 0;
                background: repeating-linear-gradient(
                    0deg,
                    transparent 0 30px,
                    rgba(0, 0, 0, 0.25) 30px 32px
                );
            }

            /* ============ INTRO SCREEN ============ */
            .hud {
                position: absolute;
                top: 18px;
                left: 0;
                right: 0;
                display: flex;
                justify-content: space-between;
                padding: 0 20px;
                font-size: 10px;
                line-height: 1.8;
                text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.4);
            }
            .hud b {
                display: block;
                font-weight: normal;
                color: var(--coin-shine);
            }

            .title-wrap {
                text-align: center;
                z-index: 2;
            }

            .world-tag {
                display: inline-block;
                background: var(--panel);
                border: 4px solid var(--white);
                padding: 10px 16px;
                font-size: 12px;
                letter-spacing: 2px;
                margin-bottom: 26px;
                box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.3);
            }

            h1 {
                font-size: clamp(26px, 7vw, 56px);
                line-height: 1.35;
                color: var(--coin);
                text-shadow:
                    3px 3px 0 var(--brick),
                    6px 6px 0 rgba(0, 0, 0, 0.35);
                margin-bottom: 10px;
                animation: title-pop 0.7s cubic-bezier(0.2, 1.6, 0.4, 1) both
                    0.2s;
            }
            h1 span {
                color: var(--white);
            }
            @keyframes title-pop {
                from {
                    transform: scale(0) rotate(-6deg);
                    opacity: 0;
                }
                to {
                    transform: scale(1) rotate(0);
                    opacity: 1;
                }
            }

            .subtitle {
                font-size: clamp(11px, 2.6vw, 16px);
                line-height: 1.9;
                text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.4);
                margin-bottom: 44px;
            }

            /* ?-block */
            .qblock {
                width: 64px;
                height: 64px;
                margin: 0 auto 40px;
                background: var(--coin);
                border: 4px solid var(--brick-dark);
                box-shadow:
                    inset 6px 6px 0 var(--coin-shine),
                    inset -6px -6px 0 #c98a00,
                    5px 5px 0 rgba(0, 0, 0, 0.3);
                font-size: 28px;
                color: var(--brick-dark);
                display: grid;
                place-items: center;
                cursor: pointer;
                user-select: none;
                position: relative;
                animation: hover-bob 1.6s ease-in-out infinite;
                border-radius: 0;
                font-family: inherit;
            }
            @keyframes hover-bob {
                0%,
                100% {
                    transform: translateY(0);
                }
                50% {
                    transform: translateY(-8px);
                }
            }
            .qblock.bump {
                animation: bump 0.3s ease;
            }
            @keyframes bump {
                30% {
                    transform: translateY(-18px);
                }
                100% {
                    transform: translateY(0);
                }
            }

            .coin-fly {
                position: absolute;
                left: 50%;
                top: -8px;
                width: 22px;
                height: 30px;
                margin-left: -11px;
                background: var(--coin);
                border: 3px solid var(--brick-dark);
                border-radius: 50%;
                box-shadow: inset 4px 0 0 var(--coin-shine);
                animation:
                    coin-pop 0.6s ease-out forwards,
                    coin-spin 0.3s linear infinite;
                pointer-events: none;
            }
            @keyframes coin-pop {
                0% {
                    transform: translateY(0) scaleX(1);
                    opacity: 1;
                }
                60% {
                    transform: translateY(-70px);
                    opacity: 1;
                }
                100% {
                    transform: translateY(-40px);
                    opacity: 0;
                }
            }
            @keyframes coin-spin {
                0% {
                    width: 22px;
                    margin-left: -11px;
                }
                50% {
                    width: 6px;
                    margin-left: -3px;
                }
                100% {
                    width: 22px;
                    margin-left: -11px;
                }
            }

            .press-start {
                background: none;
                border: none;
                color: var(--white);
                font-family: inherit;
                font-size: clamp(13px, 3vw, 18px);
                letter-spacing: 3px;
                cursor: pointer;
                text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.45);
                animation: blink 1.1s steps(1) infinite;
                padding: 14px 10px;
            }
            .press-start:hover,
            .press-start:focus-visible {
                color: var(--coin);
                animation: none;
                outline: 3px dashed var(--white);
                outline-offset: 6px;
            }
            @keyframes blink {
                50% {
                    opacity: 0;
                }
            }

            /* pipe decoration */
            .pipe {
                position: fixed;
                bottom: var(--ground-h);
                width: 84px;
                height: 110px;
                z-index: 4;
                pointer-events: none;
            }
            .pipe.left {
                left: 4%;
            }
            .pipe.right {
                right: 4%;
                height: 74px;
            }
            .pipe::before {
                /* lip */
                content: "";
                position: absolute;
                top: 0;
                left: -8px;
                right: -8px;
                height: 34px;
                background: linear-gradient(
                    90deg,
                    #35d76f 0 22%,
                    var(--pipe) 22% 78%,
                    var(--pipe-dark) 78%
                );
                border: 4px solid #003814;
            }
            .pipe::after {
                /* body */
                content: "";
                position: absolute;
                top: 34px;
                bottom: 0;
                left: 0;
                right: 0;
                background: linear-gradient(
                    90deg,
                    #35d76f 0 22%,
                    var(--pipe) 22% 78%,
                    var(--pipe-dark) 78%
                );
                border: 4px solid #003814;
                border-top: none;
            }

            /* ============ DETAILS SCREEN ============ */
            .details-inner {
                width: min(560px, 100%);
                text-align: center;
                z-index: 2;
            }
            .details-inner h2 {
                font-size: clamp(18px, 4.5vw, 30px);
                color: var(--coin);
                text-shadow:
                    3px 3px 0 var(--brick),
                    5px 5px 0 rgba(0, 0, 0, 0.3);
                line-height: 1.5;
                margin-bottom: 30px;
            }

            .panel {
                background: var(--panel);
                border: 4px solid var(--white);
                box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.3);
                padding: 18px 16px;
                margin-bottom: 18px;
                display: flex;
                align-items: center;
                gap: 16px;
                text-align: left;
                opacity: 0;
                transform: translateX(40px);
            }
            body.show-details .panel {
                animation: slide-in 0.45s ease forwards;
            }
            body.show-details .panel:nth-child(2) {
                animation-delay: 0.15s;
            }
            body.show-details .panel:nth-child(3) {
                animation-delay: 0.3s;
            }
            body.show-details .panel:nth-child(4) {
                animation-delay: 0.45s;
            }
            @keyframes slide-in {
                to {
                    opacity: 1;
                    transform: translateX(0);
                }
            }

            .panel .icon {
                width: 44px;
                height: 44px;
                flex: 0 0 44px;
                display: grid;
                place-items: center;
            }
            .panel .label {
                font-size: 9px;
                color: var(--coin-shine);
                letter-spacing: 2px;
                margin-bottom: 8px;
            }
            .panel .value {
                font-size: clamp(11px, 2.8vw, 14px);
                line-height: 1.7;
            }

            /* pixel icons drawn as SVG */
            .icon svg {
                width: 100%;
                height: 100%;
                shape-rendering: crispEdges;
            }

            .rsvp {
                display: inline-block;
                margin-top: 14px;
                background: var(--pipe);
                color: var(--white);
                text-decoration: none;
                font-size: 12px;
                letter-spacing: 2px;
                padding: 16px 26px;
                border: 4px solid #003814;
                box-shadow:
                    0 6px 0 var(--pipe-dark),
                    0 10px 0 rgba(0, 0, 0, 0.3);
                transition:
                    transform 0.1s,
                    box-shadow 0.1s;
            }
            .rsvp:active {
                transform: translateY(6px);
                box-shadow: 0 0 0 var(--pipe-dark);
            }

            .back {
                margin-top: 26px;
                background: none;
                border: none;
                color: var(--white);
                font-family: inherit;
                font-size: 10px;
                letter-spacing: 2px;
                cursor: pointer;
                text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.4);
                opacity: 0.85;
                padding: 8px;
            }
            .back:hover {
                color: var(--coin);
            }

            /* runner: little pixel hero jogging along the ground */
            .runner {
                position: fixed;
                bottom: var(--ground-h);
                left: -60px;
                width: 36px;
                height: 48px;
                z-index: 6;
                animation: run 14s linear infinite;
                pointer-events: none;
            }
            .runner svg {
                width: 100%;
                height: 100%;
                shape-rendering: crispEdges;
            }
            @keyframes run {
                0% {
                    left: -60px;
                    transform: translateY(0);
                }
                18% {
                    transform: translateY(0);
                }
                22% {
                    transform: translateY(-46px);
                } /* jump! */
                26% {
                    transform: translateY(0);
                }
                60% {
                    transform: translateY(0);
                }
                64% {
                    transform: translateY(-46px);
                }
                68% {
                    transform: translateY(0);
                }
                100% {
                    left: 110%;
                    transform: translateY(0);
                }
            }

            @media (prefers-reduced-motion: reduce) {
                .cloud,
                .qblock,
                .press-start,
                .runner,
                h1 {
                    animation: none !important;
                }
                .press-start {
                    opacity: 1;
                }
                body.show-details .panel {
                    animation: none;
                    opacity: 1;
                    transform: none;
                }
                .screen {
                    transition: none;
                }
            }

            @media (max-width: 480px) {
                .pipe.right {
                    display: none;
                }
                .hud {
                    font-size: 8px;
                }
            }
        </style>
    </head>
    <body>
        <!-- ============ SCREEN 1 : INTRO ============ -->
        <section class="screen" id="screen-intro" aria-label="Invitation intro">
            <div class="hud">
                <div>PLAYER<b>AIDEN</b></div>

            <div class="cloud c1"></div>

            <div class="cloud c3"></div>

            <div class="title-wrap">

                <h1>AIDEN<span> IS TURNING </span>7!</h1>

                    A SUPER BIRTHDAY ADVENTURE<br />NEEDS A SUPER CREW.
                </p>

                <button

                <br />

                    &#9654; PRESS START

            </div>

            <div class="pipe left"></div>
            <div class="pipe right"></div>
        </section>

            <div class="details-inner">

                <div class="panel">

                    </div>

                <!-- DATE -->
                <div class="panel">
                    <div class="icon" aria-hidden="true">
                        <!-- pixel star -->
                        <svg viewBox="0 0 16 16">

                                x="7"

                                x="5"

                            <rect

                            />
                            <rect

                            />
                            <rect
                                x="2"

                                fill="#fac000"
                            />
                            <rect
                                x="10"

                            />
                            <rect

                            />
                            <rect

                            />
                        </svg>
                    </div>
                    <div>
                        <div class="label">DATE</div>
                        <div class="value">JULY 26, 2026 <br />SUNDAY</div>
                        <!-- EDIT ME -->
                    </div>
                </div>

                <!-- TIME -->
                <div class="panel">
                    <div class="icon" aria-hidden="true">
                        <!-- pixel coin/clock -->
                        <svg viewBox="0 0 16 16">
                            <rect
                                x="4"

                <a
                    class="rsvp"

            <div class="pipe left"></div>

        <div class="ground"></div>

        <!-- little pixel runner (original character, not a sprite rip) -->

            <svg viewBox="0 0 12 16">
                <rect x="3" y="0" width="6" height="2" fill="#e43b44" />
                <!-- cap -->

                <!-- arm -->
                <rect x="3" y="10" width="2" height="4" fill="#2a6fdb" />

                <rect x="7" y="10" width="2" height="4" fill="#2a6fdb" />
                <!-- leg -->
                <rect x="2" y="14" width="3" height="2" fill="#7c2d00" />
                <!-- shoe -->
                <rect x="7" y="14" width="3" height="2" fill="#7c2d00" />
                <!-- shoe -->
            </svg>
        </div>

        <script>
            const body = document.body;
            const startBtn = document.getElementById("start-btn");
            const backBtn = document.getElementById("back-btn");
            const qblock = document.getElementById("qblock");

            startBtn.addEventListener("click", () =>
                body.classList.add("show-details"),
            );
            backBtn.addEventListener("click", () =>
                body.classList.remove("show-details"),
            );

            // Also allow Enter key on intro, like a real title screen
            document.addEventListener("keydown", (e) => {
                if (
                    e.key === "Enter" &&
                    !body.classList.contains("show-details")
                ) {
                    body.classList.add("show-details");
                }
            });

            // ?-block coin pop
            qblock.addEventListener("click", () => {
                qblock.classList.remove("bump");
                void qblock.offsetWidth; // restart animation
                qblock.classList.add("bump");

                const coin = document.createElement("span");
                coin.className = "coin-fly";
                qblock.appendChild(coin);
                setTimeout(() => coin.remove(), 650);
            });
        </script>
    </body>
</html>
